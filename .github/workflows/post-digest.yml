name: Post News Digest to Discord

on:
  # Fires when the daily routine pushes a new digest.
  push:
    paths:
      - "digests/latest.md"
  # Manual trigger for testing.
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Post digest to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python post_to_discord.py
